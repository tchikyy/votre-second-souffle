<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#f5c97a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f5c97a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c97a"/>
      <stop offset="50%" stop-color="#e8834a"/>
      <stop offset="100%" stop-color="#c85a30"/>
    </linearGradient>
    <linearGradient id="wingLeftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="40%" stop-color="#e8553a"/>
      <stop offset="100%" stop-color="#c84a2a"/>
    </linearGradient>
    <linearGradient id="wingRightGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="45%" stop-color="#e8553a"/>
      <stop offset="100%" stop-color="#c84a2a"/>
    </linearGradient>
    <linearGradient id="wingLeftInner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5ecfbf"/>
      <stop offset="50%" stop-color="#7dd8c8"/>
      <stop offset="100%" stop-color="#a8e6de"/>
    </linearGradient>
    <linearGradient id="wingRightInner" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#5ecfbf"/>
      <stop offset="50%" stop-color="#7dd8c8"/>
      <stop offset="100%" stop-color="#a8e6de"/>
    </linearGradient>
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5c97a"/>
      <stop offset="100%" stop-color="#e8834a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#e8834a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Glow halo -->
  <ellipse cx="100" cy="140" rx="70" ry="30" fill="url(#glow)"/>

  <!-- Left wing outer (pink/coral) -->
  <path d="M 90 110 Q 55 70 15 55 Q 30 75 45 90 Q 30 82 10 85 Q 28 98 50 105 Q 32 102 18 112 Q 40 115 65 115 Z"
        fill="url(#wingLeftGrad)" filter="url(#shadow)"/>
  <!-- Left wing inner feathers (teal) -->
  <path d="M 88 115 Q 58 88 28 80 Q 48 95 60 108 Q 44 100 30 105 Q 50 112 72 116 Z"
        fill="url(#wingLeftInner)" opacity="0.85"/>

  <!-- Right wing outer (pink/coral) -->
  <path d="M 110 110 Q 145 70 185 55 Q 170 75 155 90 Q 170 82 190 85 Q 172 98 150 105 Q 168 102 182 112 Q 160 115 135 115 Z"
        fill="url(#wingRightGrad)" filter="url(#shadow)"/>
  <!-- Right wing inner feathers (teal) -->
  <path d="M 112 115 Q 142 88 172 80 Q 152 95 140 108 Q 156 100 170 105 Q 150 112 128 116 Z"
        fill="url(#wingRightInner)" opacity="0.85"/>

  <!-- Body -->
  <ellipse cx="100" cy="145" rx="28" ry="38" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Chest highlight -->
  <ellipse cx="96" cy="138" rx="12" ry="18" fill="white" opacity="0.18"/>

  <!-- Tail feathers -->
  <path d="M 85 178 Q 80 195 72 208 Q 88 195 96 180 Z" fill="url(#tailGrad)" opacity="0.9"/>
  <path d="M 100 180 Q 100 200 100 215 Q 104 198 104 180 Z" fill="url(#tailGrad)"/>
  <path d="M 115 178 Q 120 195 128 208 Q 112 195 104 180 Z" fill="url(#tailGrad)" opacity="0.9"/>

  <!-- Head -->
  <circle cx="100" cy="108" r="20" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <!-- Head highlight -->
  <ellipse cx="95" cy="103" rx="8" ry="6" fill="white" opacity="0.2"/>

  <!-- Beak -->
  <path d="M 86 110 Q 75 108 74 112 Q 80 116 88 113 Z" fill="#c85a20"/>
  <path d="M 86 110 Q 75 106 74 108 Q 80 110 88 111 Z" fill="#e8834a"/>

  <!-- Eye -->
  <circle cx="92" cy="105" r="4" fill="#2a1a0a"/>
  <circle cx="91" cy="104" r="1.5" fill="white"/>

  <!-- Wing tip highlights -->
  <path d="M 15 58 Q 25 65 35 72" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4" fill="none"/>
  <path d="M 185 58 Q 175 65 165 72" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4" fill="none"/>

  <!-- Golden outline on body -->
  <ellipse cx="100" cy="145" rx="28" ry="38" stroke="#f5c97a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle cx="100" cy="108" r="20" stroke="#f5c97a" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
